name: Deploy Wallet Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build:web
        env:
          VITE_BASE_PATH: /trustcare-wallet-apps/
          VITE_TRUSTCARE_RUNTIME_ENV: demo
          VITE_TRUSTCARE_SHARE_GATEWAY_URL: https://wallet-web-production-6a00.up.railway.app/api/share-gateway
          VITE_TRUSTCARE_PUBLIC_SHARE_GATEWAY_URL: https://wallet-web-production-6a00.up.railway.app/api/share-gateway

      - name: Add SPA fallback
        run: cp apps/wallet-web/dist/index.html apps/wallet-web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/wallet-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
